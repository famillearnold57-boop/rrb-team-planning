<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RRB Team Planning</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --black:#111111; --yellow:#ffd84d; --brown:#8a5a2b; --cream:#fff7e6; --cream2:#f6eddc;
  --red:#e85d5d; --blue:#6cb7d9; --green:#2fa866; --line:#d6b27a;
}
*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:var(--cream2);color:#111}
button,input{font:inherit}
.header{background:var(--black);color:var(--yellow);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.header h1{margin:0;font-size:32px}
.status{font-size:13px;color:#fff;opacity:.85}
.toolbar{background:#191826;color:#fff;padding:12px 18px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.18)}
.btn{border:none;border-radius:10px;padding:10px 13px;cursor:pointer;font-weight:700;background:#2d2b44;color:#fff}
.btn:hover{filter:brightness(1.08)}
.btn-yellow{background:var(--yellow);color:#111}.btn-green{background:var(--green)}.btn-blue{background:#2f73df}.btn-orange{background:#e85f12}.btn-light{background:#efefef;color:#111}
.weekTitle{font-size:22px;font-weight:900;color:#fff;padding:0 8px}.spacer{flex:1}
.legend{display:flex;flex-wrap:wrap;gap:8px;background:#fff;padding:10px 18px;border-bottom:1px solid #ddd}
.legend .item{display:flex;align-items:center;gap:7px;border:2px solid transparent;background:#f8f8f8;border-radius:10px;padding:8px 10px;cursor:pointer;font-weight:800}
.legend .item.active{border-color:#111;box-shadow:0 0 0 2px var(--yellow)}
.swatch{width:22px;height:18px;border-radius:4px;border:1px solid rgba(0,0,0,.15)}
.sw-presence{background:var(--brown)}.sw-ferie{background:var(--yellow)}.sw-maladie{background:var(--red)}.sw-conges{background:var(--blue)}.sw-empty{background:white}
.main{padding:18px;max-width:1800px;margin:auto}
.dayTabs{display:flex;gap:8px;overflow:auto;padding-bottom:8px}
.dayTab{white-space:nowrap;padding:10px 12px;border-radius:10px;background:#fff;border:1px solid #ddd;cursor:pointer;font-weight:800}
.dayTab.active{background:var(--black);color:var(--yellow)}
.card{background:white;border:1.5px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.dayHead{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,var(--yellow),#ffe98c);padding:10px 12px;font-size:20px;font-weight:900}
.tableWrap{overflow:auto}
table.planning{border-collapse:collapse;width:max-content;min-width:100%;table-layout:fixed}
.planning th,.planning td{border:1px solid #d8c2a0;height:27px;padding:0;text-align:center;vertical-align:middle}
.planning th{
background:#ffdd65;
font-size:12px;
font-weight:900;
position:relative;
text-align:left;
padding-left:0;
}
.planning th span.hourLabel{
position:relative;
left:-8px;
display:inline-block;
font-weight:900;
}
.nameCol{position:sticky;left:0;z-index:3;background:#fffaf0!important;min-width:190px;width:190px;text-align:left!important;padding-left:8px!important;font-weight:800}
.infoCol{min-width:48px;width:48px;font-weight:900;font-size:13px;background:#fff7e6}
.slotCell{min-width:31px;width:31px;cursor:pointer;user-select:none;background:#fff}
.slotCell:hover{outline:2px solid #111;outline-offset:-2px}
.type-presence{background:var(--brown)!important}.type-ferie{background:var(--yellow)!important}.type-maladie{background:var(--red)!important}.type-conges{background:var(--blue)!important}
.mealBox{width:18px;height:18px;cursor:pointer}.small{font-size:12px;color:#555}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.open{display:flex}.modalBox{background:white;width:min(760px,96vw);max-height:90vh;overflow:auto;border-radius:18px;padding:18px}.modalBox h2{margin-top:0}
.empRow{display:grid;grid-template-columns:1.4fr .6fr .9fr .9fr auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #eee}
.empRow input{padding:8px;border:1px solid #ccc;border-radius:8px;min-width:0}
.exportArea{background:white;color:#111;padding:0}
@media(max-width:760px){.header h1{font-size:24px}.main{padding:10px}.toolbar{gap:7px;padding:10px}.btn{padding:9px 10px}.weekTitle{font-size:18px;width:100%}.nameCol{min-width:150px;width:150px}.slotCell{min-width:34px;width:34px}.desktopOnly{display:none!important}.empRow{grid-template-columns:1fr 75px}.empRow .dateInput{grid-column:span 2}}
@media(min-width:761px){.mobileOnly{display:none!important}}
@media print{
 body *{visibility:hidden!important} #printArea,#printArea *{visibility:visible!important}
 #printArea{position:absolute;left:0;top:0;width:100%;background:white}.noPrint{display:none!important}
 @page{size:A4 portrait;margin:8mm}

  .type-presence{background:#8a5a2b!important}
  .type-ferie{background:#ffd84d!important}
  .type-maladie{background:#e85d5d!important}
  .type-conges{background:#6cb7d9!important}

 .card{break-inside:avoid;margin-bottom:5mm;box-shadow:none;border-radius:6px}.dayHead{font-size:13px;padding:4px 6px}
 .planning th,.planning td{height:15px;font-size:8px}.nameCol{min-width:95px;width:95px;font-size:9px;padding-left:3px!important}
 .infoCol{min-width:27px;width:27px;font-size:8px}.slotCell{min-width:16px;width:16px}
}
</style>
</head>
<body>
<header><h1>Rock & Roll Bakery</h1><div class="status" id="syncStatus">Initialisation...</div></header>

<div class="toolbar noPrint">
  <button class="btn" onclick="changeWeek(-1)">←</button>
  <div class="weekTitle" id="weekTitle">Semaine</div>
  <button class="btn" onclick="changeWeek(1)">→</button>
  <button class="btn btn-blue" onclick="openEmployees()">👥 Salariés</button>
  <button class="btn btn-orange" onclick="copyWeek()">📋 Copier semaine</button>
  <button class="btn btn-yellow" onclick="pasteWeek()">📌 Coller ici</button>
  <button class="btn btn-green" onclick="saveAll(true)">💾 Sauver</button>
  <span class="spacer"></span>
  <button class="btn btn-light" onclick="setView('day')">Jour</button>
  <button class="btn btn-light desktopOnly" onclick="setView('week')">Semaine</button>
  <button class="btn btn-light" onclick="exportPdf()">PDF</button>
  <button class="btn btn-light" onclick="exportJpg()">JPG</button>
</div>

<div class="legend noPrint">
  <div class="item active" data-type="presence" onclick="selectType('presence')"><span class="swatch sw-presence"></span>Présence</div>
  <div class="item" data-type="ferie" onclick="selectType('ferie')"><span class="swatch sw-ferie"></span>Férié</div>
  <div class="item" data-type="maladie" onclick="selectType('maladie')"><span class="swatch sw-maladie"></span>Maladie</div>
  <div class="item" data-type="conges" onclick="selectType('conges')"><span class="swatch sw-conges"></span>Congés</div>
  <div class="item" data-type="empty" onclick="selectType('empty')"><span class="swatch sw-empty"></span>Effacer</div>
</div>

<div class="main">
  <div class="dayTabs noPrint" id="dayTabs"></div>
  <div id="printArea" class="exportArea"><div id="planningRoot"></div></div>
</div>

<div class="modal noPrint" id="empModal">
  <div class="modalBox">
    <h2>Gestion salariés</h2>
    <p class="small">Date d’entrée/sortie = masquage automatique sans perte d’historique. Affichage planning limité à 8 salariés actifs par jour.</p>
    <div id="empList"></div>
    <h3>Ajouter salarié</h3>
    <div class="empRow">
      <input id="newName" placeholder="Nom">
      <input id="newContract" type="number" placeholder="35">
      <input id="newStart" class="dateInput" type="date">
      <input id="newEnd" class="dateInput" type="date">
      <button class="btn btn-green" onclick="addEmployee()">Ajouter</button>
    </div>
    <div style="margin-top:14px;text-align:right"><button class="btn" onclick="closeEmployees()">Fermer</button></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://wcaynbrchpqavkvgscow.supabase.co";
const SUPABASE_KEY = "sb_publishable_DdLIcXntDziDGf2M827C7g_7Or4E9VI";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const DAYS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const SLOT_COUNT=24;
let selectedType="presence", currentWeekStart=mondayOf(new Date()), currentDayIndex=0;
let viewMode=window.innerWidth<761?"day":"week";
let employees=[], shifts={}, currentWeekId=null, isDragging=false, copiedWeek=null;

function setStatus(t){document.getElementById("syncStatus").textContent=t}
function localDateKey(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return `${y}-${m}-${day}`}
function mondayOf(date){const d=new Date(date),day=d.getDay(),diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d}
function frDate(d){return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})}
function weekNumber(d){const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dayNum=date.getUTCDay()||7;date.setUTCDate(date.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));return Math.ceil((((date-yearStart)/86400000)+1)/7)}
function slotLabel(i){const total=8*60+i*30,h=Math.floor(total/60),m=total%60;return m===0?`${h}h`:`${h}h30`}
function formatHours(h){return Number.isInteger(h)?`${h}h`:`${String(h).replace(".",",")}h`}

async function init(){document.addEventListener("mouseup",()=>isDragging=false);await loadWeek()}
async function loadWeek(){
 setStatus("Chargement...");
 document.getElementById("weekTitle").textContent=`Semaine ${weekNumber(currentWeekStart)} — ${frDate(currentWeekStart)} au ${frDate(addDays(currentWeekStart,6))}`;
 await ensureWeek(); await loadEmployees(); await loadShifts(); render(); setStatus("Synchronisé");
}
async function ensureWeek(){
 const start=localDateKey(currentWeekStart);
 let {data,error}=await supabaseClient.from("weeks").select("*").eq("start_date",start).limit(1);
 if(error){console.error(error);setStatus("Erreur semaine");return}
 if(data&&data.length){currentWeekId=data[0].id;return}
 const inserted=await supabaseClient.from("weeks").insert({start_date:start}).select().single();
 if(inserted.error){console.error(inserted.error);setStatus("Erreur création semaine");return}
 currentWeekId=inserted.data.id;
}
async function loadEmployees(){
 const {data,error}=await supabaseClient.from("employees").select("*").order("name");
 if(error){console.error(error);setStatus("Erreur salariés");employees=[];return}
 employees=data||[];
 if(employees.length===0){
  const defaults=[
   {name:"Bruno",contract_hours:35,start_date:localDateKey(currentWeekStart),end_date:null},
   {name:"Laetitia",contract_hours:35,start_date:localDateKey(currentWeekStart),end_date:null},
   {name:"Lisa",contract_hours:35,start_date:localDateKey(currentWeekStart),end_date:null},
   {name:"Solène",contract_hours:10,start_date:localDateKey(currentWeekStart),end_date:null},
   {name:"Camille",contract_hours:15,start_date:localDateKey(currentWeekStart),end_date:null}
  ];
  await supabaseClient.from("employees").insert(defaults);
  const again=await supabaseClient.from("employees").select("*").order("name");
  employees=again.data||[];
 }
}
async function loadShifts(){
 shifts={}; if(!currentWeekId)return;
 const {data,error}=await supabaseClient.from("shifts").select("*").eq("week_id",currentWeekId);
 if(error){console.error(error);setStatus("Erreur planning");return}
 for(const row of data||[]){shifts[`${row.employee_id}|${row.day}|${row.slot}`]=row.type}
}
function activeEmployeesForDay(dayIndex){
 const date=localDateKey(addDays(currentWeekStart,dayIndex));
 return employees
  .filter(e=>(!e.start_date||e.start_date<=date)&&(!e.end_date||e.end_date>=date))
  .slice(0,8);
}
function getShift(empId,dayIndex,slot){return shifts[`${empId}|${DAYS[dayIndex]}|${slot}`]||"empty"}
function setShiftLocal(empId,dayIndex,slot,type){const key=`${empId}|${DAYS[dayIndex]}|${slot}`;if(type==="empty")delete shifts[key];else shifts[key]=type}
async function saveCell(empId,dayIndex,slot,type){
 if(!currentWeekId)return; const day=DAYS[dayIndex];
 await supabaseClient.from("shifts").delete().eq("week_id",currentWeekId).eq("employee_id",empId).eq("day",day).eq("slot",slot);
 if(type!=="empty") await supabaseClient.from("shifts").insert({week_id:currentWeekId,employee_id:empId,day,slot,type});
}
function scheduleCellSave(empId,dayIndex,slot,type){saveCell(empId,dayIndex,slot,type).then(()=>setStatus("Synchronisé")).catch(e=>{console.error(e);setStatus("Erreur sauvegarde")})}
function cellDown(empId,dayIndex,slot){isDragging=true;setShiftLocal(empId,dayIndex,slot,selectedType);render();scheduleCellSave(empId,dayIndex,slot,selectedType)}
function cellEnter(empId,dayIndex,slot){if(!isDragging)return;if(getShift(empId,dayIndex,slot)===selectedType)return;setShiftLocal(empId,dayIndex,slot,selectedType);render();scheduleCellSave(empId,dayIndex,slot,selectedType)}
function mealChecked(empId,dayIndex){return getShift(empId,dayIndex,-1)==="repas"}
function toggleMeal(empId,dayIndex){const next=mealChecked(empId,dayIndex)?"empty":"repas";setShiftLocal(empId,dayIndex,-1,next);render();scheduleCellSave(empId,dayIndex,-1,next)}
function dayTotal(empId,dayIndex){let n=0;for(let s=0;s<SLOT_COUNT;s++)if(getShift(empId,dayIndex,s)==="presence")n++;return n*.5}
function weekTotal(empId){let t=0;for(let d=0;d<7;d++)t+=dayTotal(empId,d);return t}
function render(){renderTabs();const root=document.getElementById("planningRoot");root.innerHTML="";if(viewMode==="day")root.appendChild(renderDay(currentDayIndex));else for(let i=0;i<7;i++)root.appendChild(renderDay(i))}
function renderTabs(){
 const tabs=document.getElementById("dayTabs");tabs.innerHTML="";
 DAYS.forEach((day,i)=>{const btn=document.createElement("button");btn.className="dayTab"+(i===currentDayIndex?" active":"");btn.textContent=`${day} ${frDate(addDays(currentWeekStart,i))}`;btn.onclick=()=>{currentDayIndex=i;viewMode="day";render()};tabs.appendChild(btn)})
}
function renderDay(dayIndex){
 const card=document.createElement("div");card.className="card";
 const head=document.createElement("div");head.className="dayHead";head.innerHTML=`<span>${DAYS[dayIndex]} ${frDate(addDays(currentWeekStart,dayIndex))}</span><span class="small">8h → 20h</span>`;card.appendChild(head);
 const wrap=document.createElement("div");wrap.className="tableWrap";const table=document.createElement("table");table.className="planning";
 const tr1=document.createElement("tr");tr1.innerHTML=`<th class="nameCol">Salarié</th><th class="infoCol">Contrat</th><th class="infoCol">Jour</th><th class="infoCol">Sem.</th><th class="infoCol">Repas</th>`;
 for(let s=0;s<SLOT_COUNT;s++){
 const th=document.createElement("th");
 const total=8*60+s*30;
 const h=Math.floor(total/60);
 const m=total%60;
 th.innerHTML = m===0 ? `<span class="hourLabel">${h}h</span>` : "";
 tr1.appendChild(th)
} table.appendChild(tr1);
 const list=activeEmployeesForDay(dayIndex);
 for(const emp of list){
  const tr=document.createElement("tr");
  const contract=emp.contract_hours??0;
  tr.innerHTML=`<td class="nameCol">${emp.name}</td><td class="infoCol" style="color:var(--brown)">${contract}h</td><td class="infoCol">${formatHours(dayTotal(emp.id,dayIndex))}</td><td class="infoCol" style="color:#d69800">${formatHours(weekTotal(emp.id))}</td><td class="infoCol"><input class="mealBox" type="checkbox" ${mealChecked(emp.id,dayIndex)?"checked":""}></td>`;
  tr.querySelector(".mealBox").onchange=()=>toggleMeal(emp.id,dayIndex);
  for(let s=0;s<SLOT_COUNT;s++){const td=document.createElement("td");const type=getShift(emp.id,dayIndex,s);td.className=`slotCell type-${type}`;td.onmousedown=()=>cellDown(emp.id,dayIndex,s);td.onmouseenter=()=>cellEnter(emp.id,dayIndex,s);tr.appendChild(td)}
  table.appendChild(tr);
 }
 wrap.appendChild(table);card.appendChild(wrap);return card;
}
function selectType(type){selectedType=type;document.querySelectorAll(".legend .item").forEach(el=>el.classList.toggle("active",el.dataset.type===type))}
function setView(mode){viewMode=mode;render()}
function changeWeek(delta){currentWeekStart=addDays(currentWeekStart,delta*7);loadWeek()}
function copyWeek(){copiedWeek=JSON.parse(JSON.stringify(shifts));alert("Semaine copiée. Va sur la semaine destination puis clique sur Coller ici.")}
async function pasteWeek(){
 if(!copiedWeek)return alert("Aucune semaine copiée.");
 if(!confirm("Coller la semaine copiée sur cette semaine ? Cela remplace les créneaux de cette semaine."))return;
 setStatus("Collage...");await supabaseClient.from("shifts").delete().eq("week_id",currentWeekId);
 const rows=[];for(const key in copiedWeek){const [empId,day,slotStr]=key.split("|");const type=copiedWeek[key];if(type!=="empty")rows.push({week_id:currentWeekId,employee_id:empId,day,slot:Number(slotStr),type})}
 if(rows.length)await supabaseClient.from("shifts").insert(rows);await loadShifts();render();setStatus("Synchronisé")
}
async function saveAll(manual=false){setStatus("Synchronisé");if(manual)alert("Planning sauvegardé.")}
function openEmployees(){renderEmployees();document.getElementById("empModal").classList.add("open")}
function closeEmployees(){document.getElementById("empModal").classList.remove("open")}
function renderEmployees(){
 const list=document.getElementById("empList");list.innerHTML="";
 for(const emp of employees){const row=document.createElement("div");row.className="empRow";row.innerHTML=`<input value="${emp.name||""}" data-field="name"><input type="number" value="${emp.contract_hours??0}" data-field="contract_hours"><input class="dateInput" type="date" value="${emp.start_date||""}" data-field="start_date"><input class="dateInput" type="date" value="${emp.end_date||""}" data-field="end_date"><button class="btn btn-light">OK</button>`;
  row.querySelector("button").onclick=async()=>{const inputs=row.querySelectorAll("input");const patch={};inputs.forEach(i=>patch[i.dataset.field]=i.type==="number"?Number(i.value||0):(i.value||null));await supabaseClient.from("employees").update(patch).eq("id",emp.id);await loadEmployees();renderEmployees();render()};
  list.appendChild(row)
 }
}
async function addEmployee(){
 const name=document.getElementById("newName").value.trim();
 if(!name){ alert("Mets au moins un nom."); return; }

 const contract=Number(document.getElementById("newContract").value||0);

 // Si aucune date d'entrée n'est indiquée, le salarié est visible immédiatement et sur toutes les semaines.
 const start=document.getElementById("newStart").value || null;
 const end=document.getElementById("newEnd").value || null;

 const result = await supabaseClient.from("employees").insert({
   name,
   contract_hours:contract,
   start_date:start,
   end_date:end
 }).select().single();

 if(result.error){
   console.error(result.error);
   alert("Erreur ajout salarié : " + result.error.message);
   setStatus("Erreur ajout salarié");
   return;
 }

 document.getElementById("newName").value="";
 document.getElementById("newContract").value="";
 document.getElementById("newStart").value="";
 document.getElementById("newEnd").value="";

 await loadEmployees();
 renderEmployees();
 render();

 const visibleNow = activeEmployeesForDay(currentDayIndex).some(e => e.id === result.data.id);
 if(!visibleNow){
   alert("Salarié ajouté, mais non visible sur ce jour. Vérifie sa date d'entrée/sortie ou la limite de 8 salariés affichés.");
 } else {
   setStatus("Salarié ajouté");
 }
}
function exportPdf(){const old=viewMode;viewMode="week";render();setTimeout(()=>{window.print();viewMode=old;render()},200)}
async function exportJpg(){const old=viewMode;viewMode="week";render();await new Promise(r=>setTimeout(r,250));const area=document.getElementById("printArea");const canvas=await html2canvas(area,{backgroundColor:"#ffffff",scale:2});const a=document.createElement("a");a.download=`planning-rrb-semaine-${weekNumber(currentWeekStart)}.jpg`;a.href=canvas.toDataURL("image/jpeg",.95);a.click();viewMode=old;render()}
init();
</script>
</body>
</html>
